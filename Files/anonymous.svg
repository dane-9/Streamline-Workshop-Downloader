<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="70%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#2A2A2E" />
      <stop offset="100%" stop-color="#333333" />
    </radialGradient>

    <filter id="glassShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.5" />
    </filter>

    <linearGradient id="glassFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02" />
    </linearGradient>

    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <style>
    .glass {
      fill: url(#glassFill);
      stroke: url(#glassBorder);
      stroke-width: 4;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      filter: url(#glassShadow);
    }
  </style>

  <rect width="400" height="400" fill="url(#bgGradient)" />
  
  <circle class="glass" cx="200" cy="140" r="70" />
  
  <path class="glass" d="M 75 420 C 75 285, 115 240, 200 240 C 285 240, 325 285, 325 420 Z" />

</svg>